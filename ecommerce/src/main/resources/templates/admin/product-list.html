<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <div class="topbar">
        <div class="left">
            <h2>⚙️ Quản lý sản phẩm</h2>
        </div>
        <div class="right nav-links">
            <span class="small">Xin chào ADMIN: <strong sec:authentication="name"></strong></span>
            <a th:href="@{/products}" class="btn btn-secondary">Trang User</a>
            <a th:href="@{/admin/products/create}" class="btn btn-success">+ Thêm sản phẩm</a>
            <form th:action="@{/logout}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger">Đăng xuất</button>
            </form>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="search-box">
        <form method="get" th:action="@{/admin/products}" style="display:flex;gap:10px;width:100%;">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên sản phẩm...">
            <button type="submit" class="btn btn-primary">Tìm</button>
            <a th:href="@{/admin/products}" class="btn btn-secondary">Xem tất cả</a>
        </form>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Ảnh</th>
            <th>Tên sản phẩm</th>
            <th>Giá (VNĐ)</th>
            <th>Số lượng</th>
            <th>Danh mục</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="7" class="text-center small">Không có sản phẩm nào.</td>
        </tr>
        <tr th:each="p : ${products}">
            <td th:text="${p.id}"></td>
            <td>
                <img th:if="${p.imageUrl != null and !p.imageUrl.isEmpty()}"
                     th:src="${p.imageUrl}" width="70" height="55" alt="Ảnh">
                <span th:if="${p.imageUrl == null or p.imageUrl.isEmpty()}" class="small">N/A</span>
            </td>
            <td th:text="${p.name}"></td>
            <td class="price" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${p.quantity}"></td>
            <td>
                <span class="badge" th:text="${p.category != null ? p.category.name : 'N/A'}"></span>
            </td>
            <td>
                <div class="actions">
                    <a th:href="@{'/admin/products/edit/' + ${p.id}}" class="btn btn-warning">Sửa</a>
                    <a th:href="@{'/admin/products/delete/' + ${p.id}}"
                       class="btn btn-danger"
                       onclick="return confirm('Xác nhận xóa sản phẩm này?')">Xóa</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
