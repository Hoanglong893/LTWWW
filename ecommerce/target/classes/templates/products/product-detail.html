<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container" style="max-width: 900px;">

    <div class="topbar">
        <div class="left">
            <h2>📦 Chi tiết sản phẩm</h2>
        </div>
        <div class="right nav-links">
            <span class="small">Xin chào: <strong sec:authentication="name"></strong></span>
            <a th:href="@{/products}" class="btn btn-secondary">← Quay lại</a>
            <a th:href="@{/admin/products}" sec:authorize="hasRole('ADMIN')" class="btn btn-warning">
                Quản trị sản phẩm
            </a>
            <form th:action="@{/logout}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger">Đăng xuất</button>
            </form>
        </div>
    </div>

    <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start;">
        <div style="flex:1; min-width:280px;">
            <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                 th:src="${product.imageUrl}"
                 alt="Ảnh sản phẩm"
                 style="width:100%; max-width:350px; border-radius:10px; border:1px solid #ddd;">
            <div th:if="${product.imageUrl == null or product.imageUrl.isEmpty()}" class="small">
                Không có ảnh sản phẩm
            </div>
        </div>

        <div style="flex:2; min-width:280px;">
            <h2 th:text="${product.name}"></h2>
            <p><strong>Giá:</strong>
                <span class="price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
            </p>
            <p><strong>Số lượng:</strong> <span th:text="${product.quantity}"></span></p>
            <p><strong>Danh mục:</strong>
                <span class="badge" th:text="${product.category != null ? product.category.name : 'N/A'}"></span>
            </p>
            <p><strong>Mô tả:</strong></p>
            <p th:text="${product.description != null and !product.description.isEmpty() ? product.description : 'Không có mô tả'}"></p>

            <div class="actions" style="margin-top:18px;">
                <a th:href="@{/products}" class="btn btn-secondary">Quay lại danh sách</a>
                <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                   th:href="@{'/admin/products/edit/' + ${product.id}}"
                   class="btn btn-warning">Sửa sản phẩm</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
