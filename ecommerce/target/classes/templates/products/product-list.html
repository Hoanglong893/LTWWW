<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <div class="topbar">
        <div class="left">
            <h2>🛒 Danh sách sản phẩm</h2>
        </div>
        <div class="right nav-links">
            <span class="small">Xin chào: <strong sec:authentication="name"></strong></span>
            <a th:href="@{/admin/products}" sec:authorize="hasRole('ADMIN')" class="btn btn-warning">
                Quản trị sản phẩm
            </a>
            <form th:action="@{/logout}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-secondary">Đăng xuất</button>
            </form>
        </div>
    </div>

    <div class="search-box">
        <form method="get" th:action="@{/products}" style="display:flex;gap:10px;width:100%;">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên sản phẩm...">
            <button type="submit" class="btn btn-primary">Tìm</button>
            <a th:href="@{/products}" class="btn btn-secondary">Xem tất cả</a>
        </form>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>Ảnh</th>
            <th>Tên sản phẩm</th>
            <th>Giá (VNĐ)</th>
            <th>Số lượng</th>
            <th>Danh mục</th>
            <th>Mô tả</th>
            <th>Chi tiết</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="7" class="text-center small">Không tìm thấy sản phẩm nào.</td>
        </tr>
        <tr th:each="p : ${products}">
            <td>
                <img th:if="${p.imageUrl != null and !p.imageUrl.isEmpty()}"
                     th:src="${p.imageUrl}" width="80" height="60" alt="Ảnh sản phẩm">
                <span th:if="${p.imageUrl == null or p.imageUrl.isEmpty()}" class="small">Không có ảnh</span>
            </td>
            <td th:text="${p.name}"></td>
            <td class="price" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')}"></td>
            <td th:text="${p.quantity}"></td>
            <td>
                <span class="badge" th:text="${p.category != null ? p.category.name : 'N/A'}"></span>
            </td>
            <td th:text="${p.description}"></td>
            <td>
                <a th:href="@{'/products/' + ${p.id}}" class="btn btn-primary">Xem chi tiết</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
